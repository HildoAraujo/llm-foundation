pdf_path: "data/Identifying and Scaling AI Use Cases.pdf"
loader: "pymupdf"

chunking:
  strategy: "fixed"
  size: 500
  overlap: 50

embedding_model: "text-embedding-3-small"

retrieval:
  top_k: 3
  rerank:
    enabled: true
    model: "BAAI/bge-reranker-base"
    initial_top_k: 20

# legacy key kept for run_eval.py compatibility
top_k: 3

generation_model: "claude-sonnet-4-6"
max_tokens: 500
