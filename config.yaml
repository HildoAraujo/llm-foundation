pdf_path: "data/Identifying and Scaling AI Use Cases.pdf"
loader: "pymupdf"

chunking:
  strategy: "fixed"
  size: 500
  overlap: 50

embedding_model: "text-embedding-3-small"

retrieval:
  strategy: "hybrid_rerank"   # dense | bm25_only | hybrid | dense_rerank | hybrid_rerank
  top_k: 3
  initial_top_k: 20
  rerank_model: "BAAI/bge-reranker-base"

generation_model: "claude-sonnet-4-6"
max_tokens: 500
